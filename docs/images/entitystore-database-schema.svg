<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <style>
      .table { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 2; }
      .table-header { fill: #495057; }
      .table-title { fill: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 600; }
      .column-odd { fill: #ffffff; }
      .column-even { fill: #f8f9fa; }
      .column-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #212529; }
      .pk { fill: #28a745; font-weight: 600; }
      .fk { fill: #007bff; }
      .type-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; fill: #6c757d; }
      .relation-line { stroke: #adb5bd; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#adb5bd"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="600" fill="#212529">Entity Store - EAV Database Schema</text>

  <!-- entities table -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="200" height="30" rx="4" class="table-header"/>
    <text x="100" y="20" text-anchor="middle" class="table-title">entities</text>
    
    <rect x="0" y="30" width="200" height="25" class="column-odd"/>
    <text x="10" y="47" class="column-text pk">id (PK)</text>
    <text x="190" y="47" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="55" width="200" height="25" class="column-even"/>
    <text x="10" y="72" class="column-text">entity_type</text>
    <text x="190" y="72" text-anchor="end" class="type-label">string(40)</text>
    
    <rect x="0" y="80" width="200" height="25" class="column-odd"/>
    <text x="10" y="97" class="column-text">entity_handle</text>
    <text x="190" y="97" text-anchor="end" class="type-label">string(60)</text>
    
    <rect x="0" y="105" width="200" height="25" class="column-even"/>
    <text x="10" y="122" class="column-text">created_at</text>
    <text x="190" y="122" text-anchor="end" class="type-label">datetime</text>
    
    <rect x="0" y="130" width="200" height="25" class="column-odd"/>
    <text x="10" y="147" class="column-text">updated_at</text>
    <text x="190" y="147" text-anchor="end" class="type-label">datetime</text>
  </g>

  <!-- attributes table -->
  <g transform="translate(320, 70)">
    <rect x="0" y="0" width="220" height="30" rx="4" class="table-header"/>
    <text x="110" y="20" text-anchor="middle" class="table-title">attributes</text>
    
    <rect x="0" y="30" width="220" height="25" class="column-odd"/>
    <text x="10" y="47" class="column-text pk">id (PK)</text>
    <text x="210" y="47" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="55" width="220" height="25" class="column-even"/>
    <text x="10" y="72" class="column-text fk">entity_id (FK)</text>
    <text x="210" y="72" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="80" width="220" height="25" class="column-odd"/>
    <text x="10" y="97" class="column-text">attribute_key</text>
    <text x="210" y="97" text-anchor="end" class="type-label">string(255)</text>
    
    <rect x="0" y="105" width="220" height="25" class="column-even"/>
    <text x="10" y="122" class="column-text">attribute_value</text>
    <text x="210" y="122" text-anchor="end" class="type-label">text (JSON)</text>
    
    <rect x="0" y="130" width="220" height="25" class="column-odd"/>
    <text x="10" y="147" class="column-text">created_at</text>
    <text x="210" y="147" text-anchor="end" class="type-label">datetime</text>
    
    <rect x="0" y="155" width="220" height="25" class="column-even"/>
    <text x="10" y="172" class="column-text">updated_at</text>
    <text x="210" y="172" text-anchor="end" class="type-label">datetime</text>
  </g>

  <!-- entities_trash table -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="200" height="30" rx="4" class="table-header"/>
    <text x="100" y="20" text-anchor="middle" class="table-title">entities_trash</text>
    
    <rect x="0" y="30" width="200" height="25" class="column-odd"/>
    <text x="10" y="47" class="column-text pk">id (PK)</text>
    <text x="190" y="47" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="55" width="200" height="25" class="column-even"/>
    <text x="10" y="72" class="column-text">entity_type</text>
    <text x="190" y="72" text-anchor="end" class="type-label">string(40)</text>
    
    <rect x="0" y="80" width="200" height="25" class="column-odd"/>
    <text x="10" y="97" class="column-text">entity_handle</text>
    <text x="190" y="97" text-anchor="end" class="type-label">string(60)</text>
    
    <rect x="0" y="105" width="200" height="25" class="column-even"/>
    <text x="10" y="122" class="column-text">created_at</text>
    <text x="190" y="122" text-anchor="end" class="type-label">datetime</text>
    
    <rect x="0" y="130" width="200" height="25" class="column-odd"/>
    <text x="10" y="147" class="column-text">updated_at</text>
    <text x="190" y="147" text-anchor="end" class="type-label">datetime</text>
    
    <rect x="0" y="155" width="200" height="25" class="column-even"/>
    <text x="10" y="172" class="column-text">deleted_at</text>
    <text x="190" y="172" text-anchor="end" class="type-label">datetime</text>
    
    <rect x="0" y="180" width="200" height="25" class="column-odd"/>
    <text x="10" y="197" class="column-text">deleted_by</text>
    <text x="190" y="197" text-anchor="end" class="type-label">string(9)</text>
  </g>

  <!-- attributes_trash table -->
  <g transform="translate(320, 280)">
    <rect x="0" y="0" width="220" height="30" rx="4" class="table-header"/>
    <text x="110" y="20" text-anchor="middle" class="table-title">attributes_trash</text>
    
    <rect x="0" y="30" width="220" height="25" class="column-odd"/>
    <text x="10" y="47" class="column-text pk">id (PK)</text>
    <text x="210" y="47" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="55" width="220" height="25" class="column-even"/>
    <text x="10" y="72" class="column-text">entity_id</text>
    <text x="210" y="72" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="80" width="220" height="25" class="column-odd"/>
    <text x="10" y="97" class="column-text">attribute_key</text>
    <text x="210" y="97" text-anchor="end" class="type-label">string(255)</text>
    
    <rect x="0" y="105" width="220" height="25" class="column-even"/>
    <text x="10" y="122" class="column-text">attribute_value</text>
    <text x="210" y="122" text-anchor="end" class="type-label">text (JSON)</text>
    
    <rect x="0" y="130" width="220" height="25" class="column-odd"/>
    <text x="10" y="147" class="column-text">created_at</text>
    <text x="210" y="147" text-anchor="end" class="type-label">datetime</text>
    
    <rect x="0" y="155" width="220" height="25" class="column-even"/>
    <text x="10" y="172" class="column-text">updated_at</text>
    <text x="210" y="172" text-anchor="end" class="type-label">datetime</text>
    
    <rect x="0" y="180" width="220" height="25" class="column-odd"/>
    <text x="10" y="197" class="column-text">deleted_at</text>
    <text x="210" y="197" text-anchor="end" class="type-label">datetime</text>
    
    <rect x="0" y="205" width="220" height="25" class="column-even"/>
    <text x="10" y="222" class="column-text">deleted_by</text>
    <text x="210" y="222" text-anchor="end" class="type-label">string(9)</text>
  </g>

  <!-- relationships table (optional) -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="220" height="30" rx="4" class="table-header"/>
    <text x="110" y="20" text-anchor="middle" class="table-title">relationships (optional)</text>
    
    <rect x="0" y="30" width="220" height="25" class="column-odd"/>
    <text x="10" y="47" class="column-text pk">id (PK)</text>
    <text x="210" y="47" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="55" width="220" height="25" class="column-even"/>
    <text x="10" y="72" class="column-text fk">entity_id (FK)</text>
    <text x="210" y="72" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="80" width="220" height="25" class="column-odd"/>
    <text x="10" y="97" class="column-text fk">related_entity_id (FK)</text>
    <text x="210" y="97" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="105" width="220" height="25" class="column-even"/>
    <text x="10" y="122" class="column-text">relationship_type</text>
    <text x="210" y="122" text-anchor="end" class="type-label">string(50)</text>
    
    <rect x="0" y="130" width="220" height="25" class="column-odd"/>
    <text x="10" y="147" class="column-text">...</text>
  </g>

  <!-- relationships_trash (optional) -->
  <g transform="translate(600, 250)">
    <rect x="0" y="0" width="220" height="30" rx="4" class="table-header"/>
    <text x="110" y="20" text-anchor="middle" class="table-title">relationships_trash</text>
    
    <rect x="0" y="30" width="220" height="25" class="column-odd"/>
    <text x="10" y="47" class="column-text pk">id (PK)</text>
    <text x="210" y="47" text-anchor="end" class="type-label">string(9)</text>
    
    <rect x="0" y="55" width="220" height="25" class="column-even"/>
    <text x="10" y="72" class="column-text">...</text>
  </g>

  <!-- Relationship lines -->
  <!-- attributes.entity_id -> entities.id -->
  <path d="M 250 140 L 320 140" class="relation-line"/>
  
  <!-- relationships.entity_id -> entities.id -->
  <path d="M 520 120 L 600 120" class="relation-line"/>
  
  <!-- relationships.related_entity_id -> entities.id -->
  <path d="M 520 145 L 540 145 L 540 165 L 600 165" class="relation-line"/>

  <!-- Legend -->
  <g transform="translate(50, 480)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#212529">Legend:</text>
    
    <text x="0" y="25" class="pk" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12">green = Primary Key</text>
    <text x="0" y="45" class="fk" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12">blue = Foreign Key</text>
    <text x="300" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#495057">EAV Pattern: Entity-Attribute-Value storage</text>
    <text x="300" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#495057">_trash tables = Soft delete support</text>
  </g>
</svg>
